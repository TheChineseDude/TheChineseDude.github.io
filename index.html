<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Chinese Dude</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .column-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .column {
            width: 100%;
            background-color: #f4f4f4;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .column h2 {
            text-align: center;
            color: #555;
            border-bottom: 2px solid #888;
            padding-bottom: 10px;
        }
        .summary-bar {
            background-color: #e8e8e8;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;
            gap: 10px;
        }
        .summary-bar h3 {
            width: 100%;
            text-align: center;
            margin: 0 0 10px 0;
            color: #333;
        }
        .summary-stat {
            text-align: center;
            padding: 8px 16px;
            background-color: #fff;
            border-radius: 6px;
            min-width: 120px;
        }
        .summary-stat .stat-number {
            font-size: 1.5em;
            font-weight: bold;
            color: #c0392b;
        }
        .summary-stat .stat-label {
            font-size: 0.85em;
            color: #666;
        }
        .column-item {
            margin-bottom: 8px;
            display: flex;
            align-items: baseline;
        }
        .social-links {
            margin-left: 6px;
            font-size: 0.8em;
        }
        .social-links a {
            text-decoration: none;
            margin-left: 4px;
            color: #c0392b;
        }
        .social-links a:hover {
            text-decoration: underline;
        }
        .column-item-number {
            font-weight: bold;
            margin-right: 10px;
            color: #666;
        }
        @media screen and (min-width: 768px) {
            .column {
                width: 45%;
            }
        }
        @media screen and (min-width: 1024px) {
            .column {
                width: 22%;
            }
        }
    </style>
</head>
<body>
    <h1 style="display: flex; align-items: center; justify-content: center;">
        <img src="img/cxk.gif" alt="Logo" style="height: 50px;">
        <img src="img/ChineseDude.png" alt="The Chinese Dude" style="height: 50px;">
    </h1>
    
    <div class="summary-bar" id="summary-bar">
        <h3>Directory Summary</h3>
    </div>

    <div class="column-container" id="dynamic-columns">
        <!-- Columns will be dynamically populated here -->
    </div>

    <script>
        // Configuration for JSON file paths
        const configs = [
            { 
                url: 'data/restaurants.json', 
                title: 'Best Chinese Restaurants in North America',
                key: 'restaurants'
            },
            { 
                url: 'data/nannies.json', 
                title: 'Top Rated Chinese Nannies in North America',
                key: 'nannies'
            },
            { 
                url: 'data/handymen.json', 
                title: 'Top Rated Chinese Handymen in North America',
                key: 'handymen'
            },
            { 
                url: 'data/influencers.json', 
                title: 'Top Chinese Influencers in North America',
                key: 'influencers'
            }
        ];

        async function loadColumn(config) {
            try {
                const response = await fetch(config.url);
                const data = await response.json();
                const items = data[config.key];

                const columnEl = document.createElement('div');
                columnEl.className = 'column';
                
                const titleEl = document.createElement('h2');
                titleEl.textContent = config.title;
                columnEl.appendChild(titleEl);

                items.forEach((item, index) => {
                    const itemEl = document.createElement('div');
                    itemEl.className = 'column-item';
                    
                    const numberEl = document.createElement('span');
                    numberEl.className = 'column-item-number';
                    numberEl.textContent = `${index + 1}.`;
                    
                    const textEl = document.createTextNode(
                        config.key === 'influencers'
                            ? `${item.name} (${item.category})`
                            : `${item.name} (${item.location})`
                    );

                    itemEl.appendChild(numberEl);
                    itemEl.appendChild(textEl);

                    if (config.key === 'influencers' && (item.youtube || item.x)) {
                        const linksEl = document.createElement('span');
                        linksEl.className = 'social-links';
                        let links = [];
                        if (item.youtube) links.push(`<a href="${item.youtube}" target="_blank" rel="noopener">YT</a>`);
                        if (item.x) links.push(`<a href="${item.x}" target="_blank" rel="noopener">X</a>`);
                        linksEl.innerHTML = links.join(' ');
                        itemEl.appendChild(linksEl);
                    }
                    columnEl.appendChild(itemEl);
                });

                document.getElementById('dynamic-columns').appendChild(columnEl);
                updateSummary(config.key, items.length);
            } catch (error) {
                alert(`Error loading ${config.url+error}:`);
            }
        }

        function updateSummary(key, count) {
            const summaryBar = document.getElementById('summary-bar');
            const stat = document.createElement('div');
            stat.className = 'summary-stat';

            const labels = {
                restaurants: 'Restaurants',
                nannies: 'Nannies',
                handymen: 'Handymen',
                influencers: 'Influencers'
            };

            stat.innerHTML = `<div class="stat-number">${count}</div><div class="stat-label">${labels[key] || key}</div>`;
            summaryBar.appendChild(stat);
        }

        // Load all columns
        configs.forEach(loadColumn);
    </script>
</body>
</html>
